<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PIXLECT Universal Studio</title>
    <style>
        :root {
            --bg: #ffffff; --panel: #f5f5f5; --text: #1a1a1a;
            --border: #dddddd; --accent: #007acc; --editor-bg: #ffffff; --code-text: #23515c;
        }
        [data-theme="dark"] {
            --bg: #0f0f0f; --panel: #1a1a1a; --text: #e0e0e0;
            --border: #333333; --accent: #00ff88; --editor-bg: #0f0f0f; --code-text: #5ef1ff;
        }
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
        }
        header { 
            background: var(--panel); padding: 10px 20px; display: flex; 
            align-items: center; justify-content: space-between; border-bottom: 2px solid var(--border); 
        }
        .search-container { position: relative; width: 280px; }
        #langSearch { 
            width: 100%; background: var(--bg); color: var(--text); 
            border: 1px solid var(--border); padding: 8px 12px; border-radius: 4px; outline: none; 
        }
        #langList { 
            position: absolute; top: 100%; left: 0; width: 100%; 
            background: var(--panel); border: 1px solid var(--border); 
            max-height: 300px; overflow-y: auto; display: none; z-index: 100; 
        }
        .lang-item { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 13px; }
        .lang-item:hover { background: var(--accent); color: #000; }
        .workspace { display: flex; flex: 1; overflow: hidden; }
        .editor-container { flex: 1; display: flex; flex-direction: column; border-right: 2px solid var(--border); }
        textarea { 
            flex: 1; background: var(--editor-bg); color: var(--code-text); 
            border: none; padding: 20px; font-family: 'Fira Code', monospace; 
            font-size: 14px; outline: none; resize: none; 
        }
        .output-container { flex: 1; display: flex; flex-direction: column; background: #fff; }
        #consoleOutput { display: none; flex: 1; background: #000; color: #0f0; padding: 20px; font-family: monospace; white-space: pre-wrap; overflow-y: auto; }
        #webPreview { display: block; flex: 1; border: none; background: white; }
        .btn-group { display: flex; gap: 8px; }
        button { background: var(--panel); color: var(--text); border: 1px solid var(--border); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        button:hover { border-color: var(--accent); color: var(--accent); }
        .run-btn { background: var(--accent) !important; color: #000 !important; border: none; }
        .theme-toggle { font-size: 20px; background: none; border: none; cursor: pointer; padding: 0 10px; }
    </style>
</head>
<body data-theme="dark">

<header>
    <div class="btn-group">
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        <div class="search-container">
            <input type="text" id="langSearch" placeholder="Search Languages..." onfocus="showLangs()" oninput="filterLangs()">
            <div id="langList"></div>
        </div>
    </div>
    <div class="btn-group">
        <button onclick="exportProject()">📂 EXPORT CODE</button>
        <button class="run-btn" onclick="executeCode()">▶ RUN</button>
    </div>
</header>

<div class="workspace">
    <div class="editor-container">
        <textarea id="codeEditor" spellcheck="false"># Delete this and type your own code!
print("This code will be exported correctly now.")</textarea>
    </div>
    <div class="output-container">
        <iframe id="webPreview"></iframe>
        <div id="consoleOutput"></div>
    </div>
</div>

<script>
    const languages = [
        {name: "HTML/CSS/JS (Web)", id: "web", ext: "html"},
        {name: "Python 3", id: "python3", ext: "py"},
        {name: "Node.js", id: "javascript", ext: "js"},
        {name: "C++", id: "cpp", ext: "cpp"},
        {name: "Java", id: "java", ext: "java"},
        {name: "Rust", id: "rust", ext: "rs"},
        {name: "Go", id: "go", ext: "go"}
    ];

    let currentLang = languages[1]; // Default to Python
    const editor = document.getElementById('codeEditor');
    const langList = document.getElementById('langList');

    function toggleTheme() {
        document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function showLangs() { langList.style.display = 'block'; renderList(languages); }
    function renderList(list) {
        langList.innerHTML = list.map(l => `<div class="lang-item" onclick="setLang('${l.id}')">${l.name}</div>`).join('');
    }
    function filterLangs() {
        const term = document.getElementById('langSearch').value.toLowerCase();
        renderList(languages.filter(l => l.name.toLowerCase().includes(term)));
    }

    function setLang(id) {
        currentLang = languages.find(l => l.id === id);
        document.getElementById('langSearch').value = currentLang.name;
        langList.style.display = 'none';
        const isWeb = id === 'web';
        document.getElementById('webPreview').style.display = isWeb ? 'block' : 'none';
        document.getElementById('consoleOutput').style.display = isWeb ? 'none' : 'block';
    }

    async function executeCode() {
        const code = editor.value;
        if (currentLang.id === 'web') {
            const blob = new Blob([code], { type: 'text/html' });
            document.getElementById('webPreview').src = URL.createObjectURL(blob);
        } else {
            const output = document.getElementById('consoleOutput');
            output.textContent = "> Executing...";
            try {
                const res = await fetch('https://emkc.org/api/v2/piston/execute', {
                    method: 'POST',
                    body: JSON.stringify({ "language": currentLang.id, "version": "*", "files": [{ "content": code }] })
                });
                const data = await res.json();
                output.textContent = data.run.output || data.run.stderr || "Done.";
            } catch (e) { output.textContent = "API Error."; }
        }
    }

    // THE FIX: Grabs editor.value (what you typed) specifically
    function exportProject() {
        const userCode = document.getElementById('codeEditor').value; 
        const blob = new Blob([userCode], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `my_code.${currentLang.ext}`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) langList.style.display = 'none';
    });
</script>
</body>
</html>
